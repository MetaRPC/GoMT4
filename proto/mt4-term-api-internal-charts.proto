syntax = "proto3";
option csharp_namespace = "mt4_term_api";
package mt4_term_api;
option go_package = "GoMT4/pb";

service InternalCharts {
  rpc ChartOpen (ChartOpenRequest) returns (ChartOpenReply);
  rpc ChartClose (ChartCloseRequest) returns (ChartCloseReply);
  rpc CustomChartOpen (CustomChartOpenRequest) returns (CustomChartOpenReply);
  rpc CustomChartSaveTemplate (CustomChartSaveTemplateRequest) returns (CustomChartSaveTemplateReply);
  rpc CustomChartApplyTemplate (CustomChartApplyTemplateRequest) returns (CustomChartApplyTemplateReply);
}

message CustomChartApplyTemplateReply {

}
message CustomChartApplyTemplateRequest {
  int64 chart_id = 1;
  string template_file_name = 2;
}

message CustomChartSaveTemplateRequest {
  int64 chart_id = 1;
}
message CustomChartSaveTemplateReply {
  string template_file_name = 1;
}

message CustomChartOpenRequest {
  string chart_symbol = 1;
  int32 chart_period_int = 2;
}

message CustomChartOpenReply {
  int64 chart_id = 1;
}

message ChartOpenRequest {
  string chart_symbol = 1;
  ChartTemplateMode mode = 2;
}
message ChartOpenReply {
  int64 chart_terminal_id = 1;
}
enum ChartTemplateMode
{
  ON_TRADE = 0;
  ON_OPENED_ORDERS_TICKETS = 1;
  ON_ORDER_PROFIT = 2;
  ON_SYMBOL_INFO_TICK = 3;
}

message ChartCloseRequest {
  int64 chart_terminal_id = 1;
}
message ChartCloseReply {
}
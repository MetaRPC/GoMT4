syntax = "proto3";
option csharp_namespace = "mt4_term_api";
import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "mrpc-mt4-error.proto";

package mt4_term_api;
option go_package = "github.com/MetaRPC/GoMT4/pb;pb";


service AccountHelper {
  // Some information about account
  rpc AccountSummary (AccountSummaryRequest) returns (AccountSummaryReply)
  {
    option (google.api.http) = {
      get: "/AccountSummary"
    };
  }
  // List of opened orders
  rpc OpenedOrders (OpenedOrdersRequest) returns (OpenedOrdersReply)
  {
    option (google.api.http) = {
      get: "/OpenedOrders"
    };    
  }
  // List of opened orders tickets
  rpc OpenedOrdersTickets (OpenedOrdersTicketsRequest) returns (OpenedOrdersTicketsReply)
  {
    option (google.api.http) = {
      get: "/OpenedOrdersTickets"
    };
  }
  // Orders history with pagination and open date filters
  rpc OrdersHistory (OrdersHistoryRequest) returns (OrdersHistoryReply)
  {
    option (google.api.http) = {
      get: "/OrdersHistory"
    };    
  }
  // Full information about exact symbol, or all symbols
  rpc SymbolParamsMany (SymbolParamsManyRequest) returns (SymbolParamsManyReply)
  {
    option (google.api.http) = {
      get: "/SymbolParamsMany"
    };
  }
  rpc TickValueWithSize (TickValueWithSizeRequest) returns (TickValueWithSizeReply)
  {
    option (google.api.http) = {
      get: "/TickValueWithSize"
    };    
  }
}

message AccountSummaryRequest {
}
message AccountSummaryReply {
  oneof response {
    AccountSummaryData data = 1;
    Error error = 2; 
  }
}
message AccountSummaryData {
  int64 account_login = 1;
  double account_balance = 2;
  double account_equity = 3;
  string account_user_name = 4;
  int64 account_leverage = 5;
  EnumAccountTradeMode account_trade_mode = 6;
  string account_company_name = 7;
  string account_currency = 8;
  google.protobuf.Timestamp server_time = 9;
  double account_credit = 10;
  bool is_investor = 11;
  int32 utc_server_time_shift_minutes = 12;  
}

enum EnumAccountTradeMode {
  ACCOUNT_TRADE_MODE_DEMO = 0;
  ACCOUNT_TRADE_MODE_CONTEST = 1;
  ACCOUNT_TRADE_MODE_REAL = 2;
}

message OpenedOrdersRequest {
  EnumOpenedOrderSortType sort_type = 1;
}
enum EnumOpenedOrderSortType
{
  SORT_BY_OPEN_TIME_ASC = 0;
  SORT_BY_OPEN_TIME_DESC = 1;
  SORT_BY_ORDER_TICKET_ID_ASC = 2;
  SORT_BY_ORDER_TICKET_ID_DESC = 3;
}

message OpenedOrdersReply {
  oneof response {
    OpenedOrdersData data = 1;
    Error error = 2;
  }
}
message OpenedOrdersData {
  repeated OpenedOrderInfo order_infos = 1;
}
message OpenedOrderInfo {
  string comment = 1;
  double commision = 2;
  google.protobuf.Timestamp expiration_time = 3;
  double lots = 4;
  int32 magic_number = 5;
  double open_price = 6;
  double profit = 7;
  double stop_loss = 8;
  double swap = 9;
  string symbol = 10;
  double take_profit = 11;
  int32 ticket = 12;
  int32 position_index = 13;
  OpenedOrderType order_type = 14;
  int32 sort_index = 15;
  google.protobuf.Timestamp open_time = 16;
  int64 account_login = 17;
}
enum OpenedOrderType {
  OO_OP_BUY = 0;
  OO_OP_SELL = 1;
  OO_OP_BUYLIMIT = 3;
  OO_OP_BUYSTOP = 4;
  OO_OP_SELLLIMIT = 5;
  OO_OP_SELLSTOP = 6;
}

message OpenedOrdersTicketsRequest {}
message OpenedOrdersTicketsReply {
  oneof response {
    OpenedOrdersTicketsData data = 1;
    Error error = 2;
  }
}
message OpenedOrdersTicketsData {
  repeated int32 tickets = 1;
}
message OrdersHistoryReply {
  oneof response {
    OrdersHistoryData data = 1;
    Error error = 2;
  }
}
message OrdersHistoryData {
  repeated HistoryOrderInfo orders_info = 1;
  int32 total_count = 2;
}
message HistoryOrderInfo {
  string comment = 1;
  double commision = 2;
  google.protobuf.Timestamp expiration_time = 3;
  double lots = 4;
  int32 magic_number = 5;
  double open_price = 6;
  double profit = 7;
  double stop_loss = 8;
  double swap = 9;
  string symbol = 10;
  double take_profit = 11;
  int32 ticket = 12;
  int32 position_index = 13;
  OpenedOrderType order_type = 14;
  int32 sort_index = 15;
  google.protobuf.Timestamp open_time = 16;
  google.protobuf.Timestamp close_time = 17;
  double close_price = 18;
  int64 account_login = 19;
}
message OrdersHistoryRequest {
  EnumOrderHistorySortType input_sort_mode = 1;
  optional google.protobuf.Timestamp input_from = 2;
  optional google.protobuf.Timestamp input_to = 3;
  optional int32 page_number = 4;
  optional int32 items_per_page = 5;
}
enum EnumOrderHistorySortType
{
  HISTORY_SORT_BY_OPEN_TIME_ASC = 0;
  HISTORY_SORT_BY_OPEN_TIME_DESC = 1;
  HISTORY_SORT_BY_CLOSE_TIME_ASC = 2;
  HISTORY_SORT_BY_CLOSE_TIME_DESC = 3;
  HISTORY_SORT_BY_ORDER_TICKET_ID_ASC = 4;
  HISTORY_SORT_BY_ORDER_TICKET_ID_DESC= 5;
};

message SymbolParamsManyRequest {
  optional string symbol_name = 1;
}
message SymbolParamsManyReply {
  oneof response {
    SymbolParamsManyData data = 1;
    Error error = 2;
  }
}
message SymbolParamsManyData {
  repeated SymbolParamsManyInfo symbol_infos = 1;
}
message SymbolParamsManyInfo {
  bool is_selected  = 1;
  bool visible  = 2;
  int64 session_deals  = 3;
  int64 session_buy_orders  = 4;
  int64 session_sell_orders  = 5;
  int64 volume  = 6;
  int64 volume_high  = 7;
  int64 VolumeLow  = 8;
  int64 Time  = 9;
  int32 Digits  = 10;
  bool SpreadFloat  = 11;
  int32 TicksBookDepth  = 12;
  SP_ENUM_TRADE_CALC_MODE TradeCalcMode  = 13;      // MODE_MARGINCALCMODE Margin calculation mode. 0 - Forex; 1 - CFD; 2 - Futures; 3 - CFD for indices
  SP_ENUM_SYMBOL_TRADE_MODE TradeMode  = 14;
  google.protobuf.Timestamp StartTime  = 15;
  google.protobuf.Timestamp ExpirationTime  = 16;
  int32 TradeStopsLevel  = 17;
  int32 TradeFreezeLevel  = 18;
  SP_ENUM_SYMBOL_TRADE_EXECUTION TradeExeMode  = 19;
  int32 SwapMode  = 20;
  int32 SwapRollover3Days  = 21;
  double TheLast  = 22;
  double LastHigh  = 23;
  double LastLow  = 24;
  double Point  = 25;
  double TradeTickValue  = 26;
  double TradeTickValueProfit  = 27;
  double TradeTickValueLoss  = 28;
  double TradeTickSize  = 29;
  double TradeContractSize  = 30;
  double VolumeMin  = 31;
  double VolumeMax  = 32;
  double VolumeStep  = 33;
  double VolumeLimit  = 34;
  double SwapLong  = 35;
  double SwapShort  = 36;
  double MarginInitial  = 37;
  double MarginMaintenance  = 38;
  double MarginLong  = 39;
  double MarginShort  = 40;
  double MarginLimit  = 41;
  double MarginStop  = 42;
  double MarginStopLimit  = 43;
  double SessionVolume  = 44;
  double SessionTurnover  = 45;
  double SessionInterest  = 46;
  double SessionBuyOrdersVolume  = 47;
  double SessionSellOrdersVolume  = 48;
  double SessionOpen  = 49;
  double SessionClose  = 50;
  double SessionAW  = 51;
  double SessionPriceSettlement  = 52;
  double SessionPriceLimitMin  = 53;
  double SessionPriceLimitMax  = 54;
  double Bid  = 55;
  double BidHigh  = 56;
  double BidLow  = 57;
  double AskHigh  = 58;
  double AskLow  = 59;
  string CurrencyBase  = 60;
  string CurrencyProfit  = 61;
  string CurrencyMargin  = 62;
  string Bank  = 63;
  string SymDescription  = 64;
  string Isin  = 65;
  string Path  = 66;
  string SymbolName  = 67;
}
enum SP_ENUM_SYMBOL_TRADE_MODE {
  SYMBOL_TRADE_MODE_DISABLED = 0; // Trade is disabled for the symbol
  SYMBOL_TRADE_MODE_LONGONLY = 1; // Allowed only long positions
  SYMBOL_TRADE_MODE_SHORTONLY = 2; // Allowed only short positions
  SYMBOL_TRADE_MODE_CLOSEONLY = 3; // Allowed only position close operations
  SYMBOL_TRADE_MODE_FULL = 4; // No trade restrictions
}
enum SP_ENUM_SYMBOL_TRADE_EXECUTION {
  SYMBOL_TRADE_EXECUTION_REQUEST = 0;  // Execution by request
  SYMBOL_TRADE_EXECUTION_INSTANT = 1;  // Instant execution
  SYMBOL_TRADE_EXECUTION_MARKET = 2;   // Market execution
  SYMBOL_TRADE_EXECUTION_EXCHANGE = 3; // Exchange execution
}
enum SP_ENUM_TRADE_CALC_MODE {
  SYMBOL_TRADE_MARGINE_CALC_MODE_FOREX = 0; // 0 - Forex;
  SYMBOL_TRADE_MARGINE_CALC_MODE_FUTURES = 1; // 2 - Futures;
  SYMBOL_TRADE_MARGINE_CALC_MODE_CFD = 2; // 3 - CFD for indices
}

message TickValueWithSizeRequest {
  repeated string symbol_names = 1;
}
message TickValueWithSizeReply {
  oneof response {
    TickValueWithSizeData data = 1;
    Error error = 2;
  }
}
message TickValueWithSizeData {
  repeated SymbolTickValueWithSizeInfo infos = 1;
}
message SymbolTickValueWithSizeInfo {
  int32 index = 1;
  string symbolName = 2;
  double TradeTickValue = 3;
  double TradeTickSize = 4;
  double TradeContractSize = 5;
}
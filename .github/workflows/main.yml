name: ci

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache MkDocs Dependencies
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - run: pip install mkdocs-material pymdown-extensions

      # --- GOLDs SECTION STARTS HERE ---
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'  # Or any current Go version you need

      - name: Install golds (Go API doc generator)
        run: go install github.com/go-goldmark/golds@latest

      - name: Generate Go API docs with golds
        run: |
          mkdir -p docs/api
          ~/go/bin/golds -m -o ./docs/api ./examples
      # --- GOLDs SECTION ENDS HERE ---

      - name: Deploy Docs to GitHub Pages
        run: mkdocs gh-deploy --force --clean
